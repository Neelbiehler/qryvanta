name: ci

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies (frozen)
        run: pnpm install --frozen-lockfile

      - name: JavaScript/TypeScript checks
        run: pnpm check

      - name: JavaScript/TypeScript lint
        run: pnpm lint

      - name: JavaScript/TypeScript tests
        run: pnpm test

      - name: Rust check
        run: cargo xcheck --locked

      - name: Rust lint
        run: cargo xclippy --locked

      - name: Rust tests
        run: cargo xtest --locked

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: RustSec advisory audit
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  sbom:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate CycloneDX SBOM
        run: |
          syft dir:. \
            --source-name qryvanta \
            --source-version "${{ github.sha }}" \
            -o cyclonedx-json=sbom-cyclonedx.json

      - name: Generate SPDX SBOM
        run: |
          syft dir:. \
            --source-name qryvanta \
            --source-version "${{ github.sha }}" \
            -o spdx-json=sbom-spdx.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: |
            sbom-cyclonedx.json
            sbom-spdx.json
          retention-days: 30

  migrations:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: qryvanta
          POSTGRES_PASSWORD: qryvanta
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U qryvanta -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            if pg_isready -h 127.0.0.1 -U qryvanta -d postgres; then
              exit 0
            fi
            sleep 1
          done
          echo "postgres did not become ready in time" >&2
          exit 1
        env:
          PGPASSWORD: qryvanta

      - name: Verify zero-downtime migration patterns
        run: .github/scripts/verify-zero-downtime-migrations.sh

      - name: Run migration safety drill
        run: .github/scripts/migration-drill.sh
        env:
          PGPASSWORD: qryvanta

  tenant-isolation:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: qryvanta
          POSTGRES_PASSWORD: qryvanta
          POSTGRES_DB: qryvanta
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U qryvanta -d qryvanta"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            if pg_isready -h 127.0.0.1 -U qryvanta -d qryvanta; then
              exit 0
            fi
            sleep 1
          done
          echo "postgres did not become ready in time" >&2
          exit 1
        env:
          PGPASSWORD: qryvanta

      - name: Run tenant isolation adversarial tests
        env:
          DATABASE_URL: postgres://qryvanta:qryvanta@127.0.0.1:5432/qryvanta
        run: |
          cargo test -p qryvanta-infrastructure runtime_record_queries_are_tenant_scoped
          cargo test -p qryvanta-infrastructure audit_log_queries_and_purge_are_tenant_scoped
          cargo test -p qryvanta-infrastructure security_admin_runtime_permissions_and_temporary_grants_are_tenant_scoped
